version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: htstudy-postgres
    environment:
      POSTGRES_DB: htstudy
      POSTGRES_USER: htstudy
      POSTGRES_PASSWORD: htstudy_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U htstudy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: htstudy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: htstudy-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: htstudy-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: htstudy
      RABBITMQ_DEFAULT_PASS: htstudy_dev_pass

  minio:
    image: minio/minio:latest
    container_name: htstudy-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: htstudy
      MINIO_ROOT_PASSWORD: htstudy_dev_pass
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  es_data:
  minio_data:
