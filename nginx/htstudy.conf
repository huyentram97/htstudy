# Nginx Reverse Proxy Configuration for H-T.Study
# Place this in /etc/nginx/sites-available/ on VPS

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name htstudy.vn www.htstudy.vn;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name htstudy.vn www.htstudy.vn;

    # SSL certificates (auto-generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/htstudy.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/htstudy.vn/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Frontend (React SPA)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for AI operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # File upload size
        client_max_body_size 100M;
    }

    # WebSocket (for real-time notifications)
    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    location /api/v1/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://localhost:3001;
    }
}
